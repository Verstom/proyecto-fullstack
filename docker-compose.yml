version: '3.9'

services:
  backend:
    build: ./backend
    container_name: backend_app
    restart: always
    env_file:
      - .env
    ports:
      - "3000:3000"

  frontend:
    build: ./frontend
    container_name: frontend_app
    restart: always

  nginx:
    image: nginx:alpine
    container_name: nginx_server
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend
